services:
  htx-3d:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: htx-3d
    ports:
      - "8000:8000"
    volumes:
      # Model weights (download once, persist across rebuilds)
      - ../weights:/app/weights
      # Gallery storage (generated 3D models)
      - ../gallery:/app/gallery
      # SAM 3D Objects model weights (12GB, not in git)
      - /data/models/sam-3d-objects/hf:/app/weights/sam3d-objects-hf:ro
      # HuggingFace cache (SAM3 model weights, etc.)
      - /home/cj/.cache/huggingface:/root/.cache/huggingface
    environment:
      - XFORMERS_DISABLED=1
      - ATTN_BACKEND=sdpa
      - WEIGHTS_DIR=/app/weights
      - GALLERY_DIR=/app/gallery
      - TRELLIS_ENGINE_DIR=/app/engines/trellis
      - HUNYUAN_ENGINE_DIR=/app/engines/hunyuan
      - SAM3_DIR=/app/engines/sam3
      - SAM3_BPE_PATH=/app/engines/sam3/sam3/assets/bpe_simple_vocab_16e6.txt.gz
      - SAM3D_OBJECTS_DIR=/app/engines/sam3d_objects
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8000
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Optional: standalone frontend dev server (for development only)
  # frontend-dev:
  #   image: node:20-slim
  #   working_dir: /app
  #   volumes:
  #     - ../frontend:/app
  #   ports:
  #     - "5173:5173"
  #   command: sh -c "npm install && npm run dev -- --host"
